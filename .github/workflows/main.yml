name: Build and deploy project
on:
  push:
    branches:
      - main
      - feature/cicd
jobs:
  image-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read #This is required for actions/checkout
      packages: write #This is required for pushing to GHCR
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      env:
        DOCKER_BUILDKIT: 1
      run: |
        docker build -t ghcr.io/duckymoimoi/it4788:latest .

    - name: Push image
      run: |
        docker push ghcr.io/duckymoimoi/it4788:latest
        
  deploy:
    needs: [image-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read #This is required for actions/checkout
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      
    - name: Scp compose file
      uses: appleboy/scp-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.ACTION_DEPLOY_USERNAME }}
        key: ${{ secrets.ACTION_DEPLOY_SSH_KEY }}
        source: "docker-compose.ci.yml"
        target: "/home/deploy/group3"

    - name: Deploy
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.ACTION_DEPLOY_USERNAME }}
        key: ${{ secrets.ACTION_DEPLOY_SSH_KEY }}
        script: |
          cd /home/deploy/group3
          docker compose pull
          docker compose -f docker-compose.ci.yml up -d

    
