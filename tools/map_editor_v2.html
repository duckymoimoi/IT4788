<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Hospital Map Editor v2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden
    }

    /* TOP: floor tabs */
    #floor-tabs {
      display: flex;
      align-items: center;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 8px;
      min-height: 36px;
      gap: 2px;
      overflow-x: auto
    }

    .ftab {
      padding: 6px 14px;
      background: transparent;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 12px;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      white-space: nowrap
    }

    .ftab:hover {
      color: #c9d1d9;
      background: #21262d
    }

    .ftab.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
      font-weight: 600
    }

    .ftab-close {
      margin-left: 6px;
      opacity: .5;
      cursor: pointer;
      font-size: 10px
    }

    .ftab-close:hover {
      opacity: 1;
      color: #f85149
    }

    #btn-add-floor {
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 4px
    }

    #btn-add-floor:hover {
      background: #2d333b;
      color: #fff
    }

    /* MIDDLE: sidebar + canvas */
    #middle {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    #sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #30363d;
      background: #21262d;
      cursor: pointer
    }

    #sidebar-header h1 {
      font-size: 13px;
      font-weight: 700;
      color: #58a6ff
    }

    #sidebar-header p {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px
    }

    #tools {
      padding: 10px;
      border-bottom: 1px solid #30363d
    }

    #tools h2 {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px
    }

    .tbtn {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 3px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      transition: all .12s;
      text-align: left
    }

    .tbtn:hover {
      background: #2d333b;
      border-color: #58a6ff;
      color: #fff
    }

    .tbtn.active {
      background: #1f6feb;
      border-color: #58a6ff;
      color: #fff
    }

    .tkey {
      margin-left: auto;
      font-size: 10px;
      color: #8b949e;
      background: #0d1117;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace
    }

    .tbtn.active .tkey {
      color: #c9d1d9;
      background: #0d4b9e
    }

    #props {
      padding: 10px;
      flex: 1;
      overflow-y: auto
    }

    #props h2 {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px
    }

    .pr {
      margin-bottom: 6px
    }

    .pr label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 2px
    }

    .pr input,
    .pr select {
      width: 100%;
      padding: 5px 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 5px;
      font-size: 12px
    }

    .pr input:focus,
    .pr select:focus {
      outline: none;
      border-color: #58a6ff
    }

    .pchk {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #c9d1d9;
      cursor: pointer
    }

    .pchk input {
      width: auto
    }

    .hint {
      font-size: 11px;
      color: #8b949e;
      padding: 6px;
      background: #0d1117;
      border-radius: 5px;
      line-height: 1.4
    }

    .btn {
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all .12s;
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .btn-b {
      background: #1f6feb;
      color: #fff
    }

    .btn-b:hover {
      background: #388bfd
    }

    .btn-g {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d
    }

    .btn-g:hover {
      background: #2d333b
    }

    .btn-r {
      background: #b91c1c;
      color: #fff
    }

    .btn-r:hover {
      background: #dc2626
    }

    .btn-grn {
      background: #064e3b;
      color: #6ee7b7;
      border: 1px solid #065f46
    }

    .btn-grn:hover {
      background: #065f46
    }

    /* CANVAS */
    #canvas-area {
      flex: 1;
      overflow: auto;
      background: repeating-conic-gradient(#1a1f27 0% 25%, #161b22 0% 50%) 0 0/24px 24px;
      position: relative
    }

    canvas {
      display: block;
      cursor: crosshair
    }

    /* BOTTOM BAR */
    #bottombar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 6px 12px;
      flex-wrap: wrap
    }

    #bottombar .btn {
      font-size: 11px;
      padding: 5px 10px
    }

    #bottombar .sep {
      flex: 1
    }

    #stat-main {
      font-size: 11px;
      color: #c9d1d9;
      flex: 1;
      min-width: 200px
    }

    #stat-info {
      font-size: 11px;
      color: #8b949e;
      display: flex;
      gap: 12px
    }

    #stat-info span {
      display: flex;
      align-items: center;
      gap: 4px
    }

    /* MODAL overlay */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200
    }

    .modal-bg.show {
      display: flex
    }

    .modal-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      min-width: 320px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .5)
    }

    .modal-box h3 {
      font-size: 15px;
      color: #58a6ff;
      margin-bottom: 14px
    }

    .mf {
      margin-bottom: 10px
    }

    .mf label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 3px
    }

    .mf input,
    .mf select {
      width: 100%;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      font-size: 13px
    }

    .mf input:focus,
    .mf select:focus {
      outline: none;
      border-color: #58a6ff
    }
  </style>
</head>

<body>

  <!-- FLOOR TABS -->
  <div id="floor-tabs">
    <button id="btn-add-floor" onclick="addFloor()">+ Thêm tầng</button>
  </div>

  <div id="middle">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header" onclick="openMetaModal()" title="Click để chỉnh thông tin tầng">
        <h1>Map Editor v2</h1>
        <p id="hdr-info">Chưa có ảnh nền</p>
      </div>
      <div id="tools">
        <h2>Công cụ</h2>
        <button class="tbtn active" id="btn-select" onclick="setTool('select')"><b>S</b> Chọn / Di chuyển <span
            class="tkey">S</span></button>
        <button class="tbtn" id="btn-poly" onclick="setTool('poly')"><b>P</b> Vẽ phòng (Poly) <span
            class="tkey">P</span></button>
        <button class="tbtn" id="btn-door" onclick="setTool('door')"><b>D</b> Đặt cửa / Node <span
            class="tkey">D</span></button>
        <button class="tbtn" id="btn-edge" onclick="setTool('edge')"><b>E</b> Nối đường (Edge) <span
            class="tkey">E</span></button>
        <button class="tbtn" id="btn-corridor" onclick="setTool('corridor')"><b>C</b> Vẽ hành lang <span
            class="tkey">C</span></button>
      </div>
      <div id="props">
        <h2>Thuộc tính</h2>
        <div id="pp-empty" class="hint">Click vào phòng, cửa hoặc đường để chỉnh sửa.</div>
        <!-- NODE PROPS -->
        <div id="pp-node" style="display:none">
          <div class="pr"><label>Mã (code)</label><input id="p-code" oninput="setProp('code',this.value)"></div>
          <div class="pr"><label>Tên hiển thị</label><input id="p-name" oninput="setProp('name',this.value)"></div>
          <div class="pr"><label>Loại</label>
            <select id="p-type" onchange="setProp('type',this.value)">
              <option value="room">Phòng (room)</option>
              <option value="elevator">Thang máy (elevator)</option>
              <option value="escalator">Thang cuốn (escalator)</option>
              <option value="stairs">Cầu thang bộ (stairs)</option>
              <option value="wc">Vệ sinh (wc)</option>
              <option value="entrance">Lối vào (entrance)</option>
              <option value="pharmacy">Nhà thuốc (pharmacy)</option>
              <option value="info">Thông tin (info)</option>
              <option value="restricted">Cấm vào (restricted)</option>
              <option value="other">Khác (other)</option>
            </select>
          </div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="p-lm"
                onchange="setProp('landmark',this.checked)"> Điểm mốc nổi bật</label></div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="p-wc"
                onchange="setProp('wheelchair',this.checked)"> Hỗ trợ xe lăn</label></div>
          <div class="pr" style="margin-top:10px"><button class="btn btn-r" style="width:100%"
              onclick="delSel()">Xóa</button></div>
        </div>
        <!-- EDGE PROPS -->
        <div id="pp-edge" style="display:none">
          <div class="pr"><label>Trọng số (weight)</label><input id="e-w" type="number" step="0.1" min="0.1"
              oninput="setEProp('weight',parseFloat(this.value))"></div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="e-bi" checked
                onchange="setEProp('bidirectional',this.checked)"> Hai chiều</label></div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="e-wc"
                onchange="setEProp('wheelchair',this.checked)"> Xe lăn đi được</label></div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="e-cf"
                onchange="setEProp('crossFloor',this.checked)"> Nối liên tầng</label></div>
          <div class="pr" style="margin-top:10px"><button class="btn btn-r" style="width:100%" onclick="delSel()">Xóa
              edge</button></div>
        </div>
        <!-- SEG PROPS -->
        <div id="pp-seg" style="display:none">
          <div class="pr"><label>Trọng số hành lang</label><input id="s-w" type="number" step="0.1" min="0.1"
              value="1.0" oninput="setSegW(parseFloat(this.value))"></div>
          <div style="font-size:11px;color:#8b949e;padding:4px 0;line-height:1.4">Weight cao = ít ưu tiên hơn (hành lang
            hẹp/đông).</div>
          <div class="pr"><label class="pchk"><input type="checkbox" id="s-wc" checked
                onchange="setSegWc(this.checked)"> Xe lăn đi được</label></div>
          <div class="pr" style="margin-top:8px"><button class="btn btn-r" style="width:100%" onclick="delSeg()">Xóa
              đoạn này</button></div>
        </div>
      </div>
    </div>
    <!-- CANVAS -->
    <div id="canvas-area"><canvas id="cv"></canvas></div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <label class="btn btn-g" style="cursor:pointer">Tải ảnh<input type="file" accept="image/*" style="display:none"
        onchange="loadImg(this)"></label>
    <button class="btn btn-g" onclick="openMetaModal()">Thông tin tầng</button>
    <button class="btn btn-grn" onclick="autoConnect()">Tự động nối cửa</button>
    <button class="btn btn-b" onclick="doExport()">Xuất JSON</button>
    <button class="btn btn-g" onclick="doImport()">Nhập JSON</button>
    <button class="btn btn-r" onclick="clearFloor()">Xóa tầng này</button>
    <div class="sep"></div>
    <div id="stat-main">Chọn công cụ để bắt đầu</div>
    <div id="stat-info"><span>Nodes: <b id="cnt-n">0</b></span><span>Edges: <b id="cnt-e">0</b></span><span
        id="stat-xy">x:0 y:0</span></div>
  </div>

  <!-- NODE MODAL -->
  <div class="modal-bg" id="ov-node">
    <div class="modal-box">
      <h3 id="ov-node-title">Tạo node</h3>
      <div class="mf"><label>Mã (định danh) *</label><input id="m-code" placeholder="VD: P101, WC1, ELV1"></div>
      <div class="mf"><label>Tên hiển thị</label><input id="m-name" placeholder="Phòng 101, Vệ sinh..."></div>
      <div class="mf"><label>Loại</label>
        <select id="m-type">
          <option value="room">Phòng (room)</option>
          <option value="elevator">Thang máy</option>
          <option value="escalator">Thang cuốn</option>
          <option value="stairs">Cầu thang bộ</option>
          <option value="wc">Vệ sinh</option>
          <option value="entrance">Lối vào</option>
          <option value="pharmacy">Nhà thuốc</option>
          <option value="info">Thông tin</option>
          <option value="restricted">Cấm vào</option>
          <option value="other">Khác</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;margin-top:14px">
        <button class="btn btn-g" style="flex:1" onclick="closeNode(false)">Hủy</button>
        <button class="btn btn-b" style="flex:1" onclick="closeNode(true)">Tạo</button>
      </div>
    </div>
  </div>

  <!-- META MODAL -->
  <div class="modal-bg" id="ov-meta">
    <div class="modal-box">
      <h3>Thông tin tầng / tòa nhà</h3>
      <div class="mf"><label>Tên tòa nhà</label><input id="mt-bn" placeholder="Nhà A"></div>
      <div class="mf"><label>Mã tòa</label><input id="mt-bc" placeholder="A"></div>
      <div style="display:flex;gap:8px">
        <div class="mf" style="flex:1"><label>Số tầng</label><input id="mt-fn" type="number" value="1" min="0"></div>
        <div class="mf" style="flex:2"><label>Tên tầng</label><input id="mt-fname" placeholder="Tầng 1"></div>
      </div>
      <div style="background:#0d1117;border-radius:6px;padding:10px;margin-bottom:10px">
        <div style="font-size:11px;color:#8b949e;margin-bottom:6px">Kích thước thực tế (ước chừng)</div>
        <div style="display:flex;gap:8px">
          <div style="flex:1"><label style="font-size:11px;color:#8b949e">Rộng (m)</label><input id="mt-rw"
              type="number" step="0.5" value="50" style="margin-top:2px"></div>
          <div style="flex:1"><label style="font-size:11px;color:#8b949e">Cao (m)</label><input id="mt-rh" type="number"
              step="0.5" value="30" style="margin-top:2px"></div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-g" style="flex:1" onclick="closeMeta(false)">Hủy</button>
        <button class="btn btn-b" style="flex:2" onclick="closeMeta(true)">Xác nhận</button>
      </div>
    </div>
  </div>

  <script>
    // ============ MULTI-FLOOR STATE ============
    const floors = [];  // [{meta, nodes, edges, corridors, img, imgData}]
    let curFloor = 0;
    function F() { return floors[curFloor] }
    function mkFloor(num) {
      return {
        meta: { buildingName: 'Bệnh viện', buildingCode: 'A', floorNumber: num, floorName: 'Tầng ' + num, realWidthM: 50, realHeightM: 30 },
        nodes: [], edges: [], corridors: [], img: null, imgData: null
      };
    }
    floors.push(mkFloor(1));

    // ============ EDITOR STATE ============
    let tool = 'select', polyPts = [], edgeFrom = null, edgeWpts = [], corrStart = null, corrSnap = null, placeDoorNode = null;
    let sel = null, drag = null, dragWpt = null, nextId = 1, mx = 0, my = 0;
    const NC = { room: '#3b82f6', corridor: '#6b7280', elevator: '#10b981', escalator: '#34d399', stairs: '#f59e0b', wc: '#8b5cf6', entrance: '#ef4444', pharmacy: '#06b6d4', info: '#0ea5e9', restricted: '#dc2626', other: '#4b5563' };
    const gid = () => nextId++;
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    function rsCv(w = 1200, h = 800) { cv.width = w; cv.height = h }
    rsCv();

    // ============ FLOOR TABS ============
    function renderTabs() {
      const c = document.getElementById('floor-tabs');
      c.querySelectorAll('.ftab').forEach(e => e.remove());
      const btn = document.getElementById('btn-add-floor');
      floors.forEach((f, i) => {
        const t = document.createElement('button');
        t.className = 'ftab' + (i === curFloor ? ' active' : '');
        t.innerHTML = f.meta.floorName + (floors.length > 1 ? '<span class="ftab-close" onclick="event.stopPropagation();removeFloor(' + i + ')"> x</span>' : '');
        t.onclick = () => switchFloor(i);
        c.insertBefore(t, btn);
      });
    }
    function addFloor() {
      const num = floors.length + 1;
      floors.push(mkFloor(num));
      curFloor = floors.length - 1;
      resetEditorState(); renderTabs(); loadFloorToCanvas(); render(); updateHeader();
    }
    function removeFloor(i) {
      if (floors.length <= 1) { alert('Phải có ít nhất 1 tầng'); return }
      if (!confirm('Xóa tầng "' + floors[i].meta.floorName + '"?')) return;
      floors.splice(i, 1);
      if (curFloor >= floors.length) curFloor = floors.length - 1;
      resetEditorState(); renderTabs(); loadFloorToCanvas(); render(); updateHeader();
    }
    function switchFloor(i) {
      if (i === curFloor) return;
      curFloor = i; resetEditorState(); renderTabs(); loadFloorToCanvas(); render(); updateHeader();
    }
    function resetEditorState() { sel = null; drag = null; dragWpt = null; polyPts = []; edgeFrom = null; edgeWpts = []; corrStart = null; corrSnap = null; placeDoorNode = null; updProps(); }
    function loadFloorToCanvas() {
      const f = F();
      if (f.img) { rsCv(f.img.width, f.img.height); } else { rsCv(); }
    }

    // ============ IMAGE ============
    function loadImg(inp) {
      const file = inp.files[0]; if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => { F().img = img; rsCv(img.width, img.height); render(); openMetaModal() };
      img.src = url; inp.value = '';
    }

    // ============ TOOLS ============
    function setTool(t) {
      tool = t; polyPts = []; edgeFrom = null; edgeWpts = []; corrStart = null; corrSnap = null; placeDoorNode = null;
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
      const el = document.getElementById('btn-' + t); if (el) el.classList.add('active');
      updStatus(); render();
    }
    document.addEventListener('keydown', e => {
      if (document.querySelector('.modal-bg.show')) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      const m = { s: 'select', p: 'poly', d: 'door', e: 'edge', c: 'corridor' };
      if (m[e.key]) { setTool(m[e.key]); return }
      if (e.key === 'Escape') { if (placeDoorNode) { placeDoorNode = null; setTool('select'); return } polyPts = []; edgeFrom = null; edgeWpts = []; corrStart = null; render(); updStatus() }
      if ((e.key === 'Delete' || e.key === 'Backspace') && sel) delSel();
    });

    // ============ NODE MODAL ============
    let _ncb = null;
    function openNodeModal(title, code, name, type, cb) {
      document.getElementById('ov-node-title').textContent = title || 'Tạo node';
      document.getElementById('m-code').value = code || '';
      document.getElementById('m-name').value = name || '';
      document.getElementById('m-type').value = type || 'room';
      document.getElementById('ov-node').classList.add('show');
      setTimeout(() => document.getElementById('m-code').select(), 50);
      _ncb = cb;
    }
    function closeNode(ok) {
      document.getElementById('ov-node').classList.remove('show');
      if (ok && _ncb) {
        const c = document.getElementById('m-code').value.trim(), n = document.getElementById('m-name').value.trim(), t = document.getElementById('m-type').value;
        if (!c) { alert('Cần nhập mã (code)'); document.getElementById('ov-node').classList.add('show'); return }
        _ncb({ code: c, name: n || c, type: t });
      } _ncb = null;
    }
    document.getElementById('ov-node').addEventListener('keydown', e => { if (e.key === 'Enter') closeNode(true); if (e.key === 'Escape') closeNode(false) });

    // ============ META MODAL ============
    function openMetaModal() {
      const m = F().meta;
      document.getElementById('mt-bn').value = m.buildingName;
      document.getElementById('mt-bc').value = m.buildingCode;
      document.getElementById('mt-fn').value = m.floorNumber;
      document.getElementById('mt-fname').value = m.floorName;
      document.getElementById('mt-rw').value = m.realWidthM;
      document.getElementById('mt-rh').value = m.realHeightM;
      document.getElementById('ov-meta').classList.add('show');
    }
    function closeMeta(ok) {

      const addE = (a, b, w, wc) => { if (a === b) return; if (f.edges.some(e => (e.from === a && e.to === b) || (e.from === b && e.to === a))) return; f.edges.push({ id: gid(), from: a, to: b, waypoints: [], weight: w, bidirectional: true, wheelchair: wc !== undefined ? wc : true, crossFloor: false }); ne++ };
      const segs = [...f.corridors.map(s => ({ ...s }))];
      for (const door of doors) {
        let best = null, bestD = Infinity, bestSeg = null; for (const s of segs) { const ft = footOnSeg(door.cx, door.cy, s.ax, s.ay, s.bx, s.by); if (ft.d < bestD) { bestD = ft.d; best = ft; bestSeg = s } } if (!best || bestD > 600) continue;
        let fid; const atA = best.t < .02, atB = best.t > .98;
        const segWc = bestSeg.wheelchair !== false;
        if (atA || atB) { fid = fOrMk(atA ? bestSeg.ax : bestSeg.bx, atA ? bestSeg.ay : bestSeg.by, segWc) }
        else { const { x: fx, y: fy } = best; fid = fOrMk(fx, fy, segWc); segs.push({ id: gid(), ax: bestSeg.ax, ay: bestSeg.ay, bx: fx, by: fy, weight: bestSeg.weight, wheelchair: bestSeg.wheelchair }); segs.push({ id: gid(), ax: fx, ay: fy, bx: bestSeg.bx, by: bestSeg.by, weight: bestSeg.weight, wheelchair: bestSeg.wheelchair }); const idx = segs.indexOf(bestSeg); if (idx >= 0) segs.splice(idx, 1) }
        addE(door.id, fid, 1.0, segWc);
      }
      for (const s of segs) { const swc = s.wheelchair !== false; addE(fOrMk(s.ax, s.ay, swc), fOrMk(s.bx, s.by, swc), s.weight, swc) }
      sel = null; updProps(); render();
      alert('Tự động nối xong!\n- ' + nn + ' junction mới\n- ' + ne + ' edge mới');
    }

    // ============ EXPORT / IMPORT ============
    function doExport() {
      const out = {
        floors: floors.map(f => {
          const sx = f.meta.realWidthM / (f.img ? f.img.width : 1), sy = f.meta.realHeightM / (f.img ? f.img.height : 1);
          return {
            meta: { building_name: f.meta.buildingName, building_code: f.meta.buildingCode, floor_number: f.meta.floorNumber, floor_name: f.meta.floorName, image_width_px: f.img ? f.img.width : 0, image_height_px: f.img ? f.img.height : 0, real_width_m: f.meta.realWidthM, real_height_m: f.meta.realHeightM },
            nodes: f.nodes.map(n => ({ node_code: n.code, node_name: n.name, node_type: n.type, polygon_coords: n.isPoly ? n.poly.map(p => p.join(',')).join(',') : '', center_x: Math.round(n.cx * 10) / 10, center_y: Math.round(n.cy * 10) / 10, access_x: Math.round(n.cx * 10) / 10, access_y: Math.round(n.cy * 10) / 10, is_landmark: n.landmark, is_accessible: true, wheelchair_accessible: n.wheelchair, is_active: true })),
            edges: f.edges.map(e => { const fn = f.nodes.find(n => n.id === e.from), tn = f.nodes.find(n => n.id === e.to); const dx = ((tn?.cx || 0) - (fn?.cx || 0)) * sx, dy = ((tn?.cy || 0) - (fn?.cy || 0)) * sy; const dm = Math.round(Math.sqrt(dx * dx + dy * dy) * 100) / 100; const crossTypes = ['elevator','escalator','stairs']; const autoCross = e.crossFloor || (fn && crossTypes.includes(fn.type)) || (tn && crossTypes.includes(tn.type)); return { from_code: fn?.code, to_code: tn?.code, polygon_coords: e.waypoints.length ? e.waypoints.map(p => Math.round(p[0] * 10) / 10 + ',' + Math.round(p[1] * 10) / 10).join(',') : null, distance_m: dm, weight: e.weight, is_bidirectional: e.bidirectional, is_cross_floor: !!autoCross, wheelchair_accessible: e.wheelchair, is_active: true } }),
            corridors: f.corridors.map(s => ({ ax: Math.round(s.ax), ay: Math.round(s.ay), bx: Math.round(s.bx), by: Math.round(s.by), weight: s.weight, wheelchair_accessible: s.wheelchair !== false }))
          }
        })
      };
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'map_data.json'; a.click();
    }
    function doImport() {
      const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
      inp.onchange = e => {
        const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = ev => {
          try {
            const d = JSON.parse(ev.target.result);
            if (d.floors && Array.isArray(d.floors)) {
              floors.length = 0; nextId = 1;
              for (const fl of d.floors) {
                const f = mkFloor(fl.meta?.floor_number || 1);
                f.meta.buildingName = fl.meta?.building_name || 'Bệnh viện'; f.meta.buildingCode = fl.meta?.building_code || 'A';
                f.meta.floorNumber = fl.meta?.floor_number || 1; f.meta.floorName = fl.meta?.floor_name || 'Tầng 1';
                f.meta.realWidthM = fl.meta?.real_width_m || 50; f.meta.realHeightM = fl.meta?.real_height_m || 30;
                const codeToId = {};
                for (const n of (fl.nodes || [])) { let poly = null; if (n.polygon_coords && n.polygon_coords.length > 0) { const nums = n.polygon_coords.split(',').map(Number); poly = []; for (let i = 0; i < nums.length; i += 2)poly.push([nums[i], nums[i + 1]]) } const id = gid(); codeToId[n.node_code] = id; f.nodes.push({ id, code: n.node_code, name: n.node_name, type: n.node_type, isPoly: !!poly, poly, cx: n.center_x, cy: n.center_y, landmark: n.is_landmark || false, wheelchair: n.wheelchair_accessible !== false }) }
                for (const e of (fl.edges || [])) { let wpts = []; if (e.polygon_coords) { const nums = e.polygon_coords.split(',').map(Number); for (let i = 0; i < nums.length; i += 2) wpts.push([nums[i], nums[i + 1]]) } else if (e.waypoints) { wpts = e.waypoints.map(p => [p.x, p.y]) } f.edges.push({ id: gid(), from: codeToId[e.from_code], to: codeToId[e.to_code], waypoints: wpts, weight: e.weight || 1, bidirectional: e.is_bidirectional !== false, wheelchair: e.wheelchair_accessible !== false, crossFloor: e.is_cross_floor || false }) }
                for (const s of (fl.corridors || [])) f.corridors.push({ id: gid(), ax: s.ax, ay: s.ay, bx: s.bx, by: s.by, weight: s.weight || 1, wheelchair: s.wheelchair_accessible !== false });
                floors.push(f);
              }
              curFloor = 0; resetEditorState(); renderTabs(); loadFloorToCanvas(); render(); updateHeader();
              alert('Nhập xong: ' + floors.length + ' tầng');
            } else { alert('JSON không đúng format (cần có trường "floors")') }
          } catch (err) { alert('Lỗi parse: ' + err.message) }
        }; r.readAsText(file)
      }; inp.click();
    }

    // ============ INIT ============
    renderTabs(); render(); updStatus(); updateHeader();
  </script>
