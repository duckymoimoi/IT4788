      - Flow
      summary: Mật độ tại vị trí
      description: 'Trả về mật độ tại 1 grid_location.

        - Khi simulation đang chạy: trả frequency (số lần agent đi qua) trong window 5 phút, window_minutes > 0.

        - Khi không có simulation: đếm user_pings trong 30 phút gần nhất.

        '
      parameters:
      - name: grid_location
        in: query
        schema:
          type: integer
      - name: route_id
        in: query
        schema:
          type: string
      responses:
        '200':
          description: OK — `data.count` là số lượt, `data.window_minutes` là cửa sổ thời gian
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success:
                  summary: Successful response
                  value:
                    code: 1000
                    message: Success
                    data:
                      result: true
                error:
                  summary: Error response
                  value:
                    code: 4000
                    message: Error message
                    data: null
  /api/flow/get_heatmap:
    get:
      tags:
      - Flow
      summary: Bản đồ nhiệt
      parameters:
      - name: route_id
        in: query
        schema:
          type: string
      description: 'Trả về heatmap toàn bệnh viện.

        - Khi simulation đang chạy: dùng tần suất tích lũy (throughput) trong window 5 phút — ô nào agents đi qua nhiều sẽ
        có density cao.

        - Khi không có simulation: query user_pings 30 phút gần nhất, GROUP BY grid_location.

        '
      responses:
        '200':
          description: OK — `data[]` là mảng `{grid_location, density}`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success:
                  summary: Successful response
                  value:
                    code: 1000
                    message: Success
                    data:
                    - grid_location: 128
                      density: 12
                error:
                  summary: Error response
                  value:
                    code: 4000
                    message: Error message
                    data: null
