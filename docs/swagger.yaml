  # ============================================================
  # FLOW - Public
  # ============================================================
  /api/flow/get_density:
    get:
      tags: [Flow]
      summary: Mật độ tại vị trí
      description: |
        Trả về mật độ tại 1 grid_location.
        - Khi simulation đang chạy: trả frequency (số lần agent đi qua) trong window 5 phút, window_minutes > 0.
        - Khi không có simulation: đếm user_pings trong 30 phút gần nhất.
      parameters:
        - name: grid_location
          in: query
          schema: { type: integer }
        - name: route_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK — `data.count` là số lượt, `data.window_minutes` là cửa sổ thời gian
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/flow/get_heatmap:
    get:
      tags: [Flow]
      summary: Bản đồ nhiệt
      parameters:
        - name: route_id
          in: query
          schema: { type: string }
      description: |
        Trả về heatmap toàn bệnh viện.
        - Khi simulation đang chạy: dùng tần suất tích lũy (throughput) trong window 5 phút — ô nào agents đi qua nhiều sẽ có density cao.
        - Khi không có simulation: query user_pings 30 phút gần nhất, GROUP BY grid_location.
      responses:
        "200":
          description: OK — `data[]` là mảng `{grid_location, density}`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/flow/get_bottlenecks:
    get:
      tags: [Flow]
      summary: Điểm tắc nghẽn
      description: |
        Trả về top N điểm tắc nghẽn nhất.
        - Khi simulation đang chạy: top N vị trí có tần suất agent đi qua cao nhất (window 5 phút).
        - Khi không có simulation: top N từ user_pings 30 phút gần nhất.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: OK — `data[]` là mảng `{grid_location, count}` sắp xếp giảm dần
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

