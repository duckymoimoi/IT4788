openapi: 3.0.3
info:
  title: Hospital Navigation API
  description: Hệ thống điều hướng và quản lý bệnh viện thông minh
  version: 1.0.0
servers:
  - url: http://group3.it4788.sukkaito.id.vn
    description: Production
  - url: http://localhost:8080
    description: Local

tags:
  - name: Auth
    description: Xác thực người dùng
  - name: User
    description: Quản lý hồ sơ & cài đặt
  - name: System
    description: Hệ thống (version, voice)
  - name: Map
    description: Bản đồ, POI, tầng
  - name: Admin-Map
    description: Quản trị bản đồ (Admin only)
  - name: Route
    description: Tìm đường & điều hướng
  - name: Flow
    description: Luồng người & mật độ
  - name: Simulate
    description: Mô phỏng MAPF
  - name: Medical
    description: Y tế / HIS
  - name: Device
    description: Thiết bị / Xe lăn
  - name: Notification
    description: Thông báo
  - name: SOS
    description: Khẩn cấp
  - name: Chat
    description: Chat hỗ trợ
  - name: Util
    description: Tiện ích (FAQ, feedback...)
  - name: Engine
    description: Engine tính toán (Admin only)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Response:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: OK
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          nullable: true
          example: null

paths:
  # ============================================================
  # AUTH - Public
  # ============================================================
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, password]
              properties:
                phone_number: { type: string, example: "0900000001" }
                password: { type: string, example: "password123" }
                device_token: { type: string }
                platform: { type: string, enum: [android, ios] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 1000 }
                  message: { type: string, example: OK }
                  data:
                    type: object
                    properties:
                      user_id: { type: integer }
                      full_name: { type: string }
                      phone_number: { type: string }
                      token: { type: string }
                      role: { type: string }

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, password, full_name]
              properties:
                phone_number: { type: string }
                password: { type: string, minLength: 6 }
                full_name: { type: string }
                dob: { type: string, example: "2000-01-01" }
                gender: { type: integer, enum: [0, 1, 2] }
      responses:
        "200":
          description: OK - trả OTP info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/auth/verify_otp:
    post:
      tags: [Auth]
      summary: Xác thực OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, otp]
              properties:
                phone_number: { type: string }
                otp: { type: string }
                otp_type:
                  {
                    type: string,
                    enum: [signup, reset_password],
                    default: signup,
                  }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/auth/forgot_password:
    post:
      tags: [Auth]
      summary: Quên mật khẩu (gửi OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number]
              properties:
                phone_number: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/auth/reset_password:
    post:
      tags: [Auth]
      summary: Đặt lại mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, otp, new_password]
              properties:
                phone_number: { type: string }
                otp: { type: string }
                new_password: { type: string, minLength: 6 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fcm_token: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/auth/change_password:
    post:
      tags: [Auth]
      summary: Đổi mật khẩu
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 6 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ============================================================
  # USER - Private
  # ============================================================
  /api/user/get_profile:
    get:
      tags: [User]
      summary: Lấy hồ sơ
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/user/set_profile:
    post:
      tags: [User]
      summary: Cập nhật hồ sơ
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                dob: { type: string }
                gender: { type: integer }
                avatar: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/user/set_devtoken:
    post:
      tags: [User]
      summary: Đăng ký device token (FCM)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_token, platform]
              properties:
                device_token: { type: string }
                platform: { type: string, enum: [android, ios] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/user/get_settings:
    get:
      tags: [User]
      summary: Lấy cài đặt
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/user/set_settings:
    post:
      tags: [User]
      summary: Cập nhật cài đặt
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                language: { type: string }
                theme: { type: string }
                notification: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/user/delete_account:
    delete:
      tags: [User]
      summary: Xóa tài khoản
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ============================================================
  # SYSTEM - Public
  # ============================================================
  /api/sys/check_version:
    get:
      tags: [System]
      summary: Kiểm tra phiên bản app
      parameters:
        - name: platform
          in: query
          required: true
          schema: { type: string, enum: [android, ios] }
        - name: app_version
          in: query
          required: true
          schema: { type: string, example: "1.0.0" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/sys/get_voice_key:
    get:
      tags: [System]
      summary: Lấy voice API key
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/sys/get_voice_files:
    get:
      tags: [System]
      summary: Danh sách file giọng nói dẫn đường
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ============================================================
  # MAP - Public
  # ============================================================
  /api/map/get_floors:
    get:
      tags: [Map]
      summary: Danh sách tầng
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/get_nodes:
    get:
      tags: [Map]
      summary: Danh sách POI trên bản đồ
      parameters:
        - name: map_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/get_edges:
    get:
      tags: [Map]
      summary: Danh sách cạnh (adjacency)
      description: |
        Tính edges tự động từ grid_data (4 hướng N/S/E/W).
        Trả về danh sách cạnh giữa các ô walkable liền kề, mỗi cạnh chỉ 1 chiều (from_location < to_location).
      parameters:
        - name: map_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK — `data.edges[]` là mảng `{from_row, from_col, from_location, to_row, to_col, to_location}`, `data.total` là tổng số cạnh
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/get_meta:
    get:
      tags: [Map]
      summary: Metadata bản đồ
      parameters:
        - name: map_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/get_depts:
    get:
      tags: [Map]
      summary: Danh sách khoa/phòng
      parameters:
        - name: node_type
          in: query
          schema: { type: string }
        - name: ward_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/search_location:
    get:
      tags: [Map]
      summary: Tìm kiếm vị trí
      parameters:
        - name: keyword
          in: query
          required: true
          schema: { type: string }
        - name: map_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/get_landmarks:
    get:
      tags: [Map]
      summary: Danh sách landmark
      parameters:
        - name: map_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/map/sync_full:
    get:
      tags: [Map]
      summary: Đồng bộ toàn bộ bản đồ
      parameters:
        - name: map_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ============================================================
  # ADMIN - Map Management (Admin only)
  # ============================================================
  /api/admin/get_maps:
    get:
      tags: [Admin-Map]
      summary: Lấy danh sách map
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/set_active_map:
    post:
      tags: [Admin-Map]
      summary: Đổi Map Active
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [map_id]
              properties:
                map_id: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/upload_map:
    post:
      tags: [Admin-Map]
      summary: Tải lên file .map
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                map_name: { type: string }
                rows: { type: string }
                cols: { type: string }
                file:
                  {
                    type: string,
                    format: binary,
                    description: "File .map từ MovingAI",
                  }
                image_file:
                  {
                    type: string,
                    format: binary,
                    description: "Ảnh preview của map (định dạng PNG/JPG/WEBP)",
                  }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/upload_output:
    post:
      tags: [Admin-Map]
      summary: Tải lên file output.json (MAPF)
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                map_id: { type: integer }
                file: { type: string, format: binary }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/export_map:
    get:
      tags: [Admin-Map]
      summary: Xuất file .map
      security: [{ BearerAuth: [] }]
      parameters:
        - name: filename
          in: query
          required: true
          schema: { type: string, example: "warehouse_small.map" }
          description: Tên file .map cần xuất (lấy từ trường map_file_path của map)
      responses:
        "200":
          description: OK (Trả về file .map binary)

  /api/admin/add_node:
    post:
      tags: [Admin-Map]
      summary: Thêm Node mới (POI)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, map_id, name, type]
              properties:
                id: { type: string, description: "POI code (unique)" }
                map_id: { type: integer }
                name: { type: string }
                type: { type: string, example: "hallway" }
                x: { type: integer, description: "Grid column" }
                y: { type: integer, description: "Grid row" }
                ward_id: { type: integer }
                is_landmark: { type: boolean }
                wheelchair_accessible: { type: boolean }
                capacity: { type: integer }
                details: { type: string }
                open_hours: { type: string }
      responses:
        "200":
          description: |
            1000 — Thêm thành công, data là POI vừa tạo.
            2001 — Thiếu field bắt buộc (id, map_id, name, type).
            2002 — Sai kiểu dữ liệu (ví dụ id phải là string).
            4001 — map_id không tồn tại.
            4009 — POI code đã tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/edit_node:
    post:
      tags: [Admin-Map]
      summary: Sửa Node
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
                x: { type: integer }
                y: { type: integer }
                name: { type: string }
                type: { type: string }
                is_landmark: { type: boolean }
                wheelchair_accessible: { type: boolean }
                is_accessible: { type: boolean }
                capacity: { type: integer }
                details: { type: string }
                open_hours: { type: string }
                custom_weight: { type: number }
      responses:
        "200":
          description: |
            1000 — Cập nhật thành công.
            2001 — Thiếu id.
            4001 — Node không tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/del_node:
    delete:
      tags: [Admin-Map]
      summary: Xóa Node (soft delete)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string, description: "POI code" }
      responses:
        "200":
          description: |
            1000 — Xóa thành công.
            2001 — Thiếu id.
            4001 — Node không tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/add_edge:
    post:
      tags: [Admin-Map]
      summary: Thêm Edge thủ công giữa 2 node
      description: |
        Trong grid-map, edges thường được tính tự động từ grid adjacency.
        API này cho phép thêm edge thủ công (manual override) vào bảng map_steps.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [map_id, start_node, end_node, distance]
              properties:
                map_id: { type: integer }
                start_node:
                  { type: string, description: "POI code của node bắt đầu" }
                end_node:
                  { type: string, description: "POI code của node kết thúc" }
                distance: { type: number, minimum: 0.001, example: 5.5 }
      responses:
        "200":
          description: |
            1000 — Tạo thành công, data.id là edge id.
            2001 — Thiếu map_id, start_node, end_node hoặc distance.
            2003 — distance <= 0.
            4001 — map_id không tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/del_edge:
    delete:
      tags: [Admin-Map]
      summary: Xóa Edge thủ công
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer, description: "Edge ID" }
      responses:
        "200":
          description: |
            1000 — Xóa thành công.
            2001 — Thiếu id.
            4001 — Edge không tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/admin/set_weight:
    patch:
      tags: [Admin-Map]
      summary: Đặt trọng số tùy chỉnh cho Edge (qua edge_id)
      description: |
        Cập nhật trọng số (custom_weight) dùng trong thuật toán pathfinding.
        edge_id tương ứng với poi_id của POI (node) trên grid.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [edge_id, weight]
              properties:
                edge_id: { type: integer }
                weight: { type: number, minimum: 0.001, example: 2.5 }
      responses:
        "200":
          description: |
            1000 — Cập nhật thành công.
            2001 — Thiếu edge_id hoặc weight.
            2002 — Sai kiểu dữ liệu weight.
            2003 — weight <= 0.
            4001 — edge_id không tồn tại.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ============================================================
  # ROUTE
  # ============================================================
  /api/route/get_modes:
    get:
      tags: [Route]
      summary: Danh sách chế độ di chuyển
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/route/preview:
    post:
      tags: [Route]
      summary: Xem trước tuyến đường
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_location, dest_location, mode_id]
              properties:
                start_location: { type: integer }
                dest_location: { type: integer }
                mode_id:
                  {
                    type: string,
                    enum: [walking, wheelchair, stretcher, hospital_cart],
                  }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/route/order:
    post:
      tags: [Route]
      summary: Đặt tuyến đường
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_location, dest_location, mode_id]
              properties:
                start_location: { type: integer }
                dest_location: { type: integer }
                mode_id: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  /api/route/order_multi:
    post:
      tags: [Route]
      summary: Đặt tuyến đường nhiều điểm
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_location, target_locations, mode_id]
              properties:
                start_location: { type: integer }
                target_locations:
                  type: array
                  items: { type: integer }
                mode_id: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

