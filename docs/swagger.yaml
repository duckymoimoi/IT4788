openapi: 3.0.3
info:
  title: Hospital Navigation API
  description: Hệ thống điều hướng và quản lý bệnh viện thông minh
  version: 1.0.0
servers:
- url: https://group3.it4788.sukkaito.id.vn
  description: Production
- url: http://localhost:8080
  description: Local
tags:
- name: Auth
  description: Xác thực người dùng
- name: User
  description: Quản lý hồ sơ & cài đặt
- name: System
  description: Hệ thống (version, voice)
- name: Map
  description: Bản đồ, POI, tầng
- name: Admin-Map
  description: Quản trị bản đồ (Admin only)
- name: Route
  description: Tìm đường & điều hướng
- name: Flow
  description: Luồng người & mật độ
- name: Simulate
  description: Mô phỏng MAPF
- name: Medical
  description: Y tế / HIS
- name: Device
  description: Thiết bị / Xe lăn
- name: Notification
  description: Thông báo
- name: SOS
  description: Khẩn cấp
- name: Chat
  description: Chat hỗ trợ
- name: Util
  description: Tiện ích (FAQ, feedback...)
- name: Engine
  description: Engine tính toán (Admin only)
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Response:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: OK
        data:
          type: object
          nullable: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          nullable: true
          example: null
paths:
  /api/auth/login:
    post:
      tags:
      - Auth
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - phone_number
              - password
              properties:
                phone_number:
                  type: string
                  example: 0900000001
                phone:
                  type: string
                  example: 0900000001
                  description: Alias tương thích test; ưu tiên dùng phone_number.
                password:
                  type: string
                  example: password123
                device_token:
                  type: string
                platform:
                  type: string
                  enum:
                  - android
                  - ios
            examples:
              default:
                summary: Request example
                value:
                  phone_number: 0900000001
                  phone: 0900000001
                  password: password123
                  device_token: fcm-token-example
                  platform: android
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 1000
                  message:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                      full_name:
                        type: string
                      phone_number:
                        type: string
                      token:
                        type: string
                      accessToken:
                        type: string
                        description: Alias tương thích test, cùng giá trị với token.
                      refreshToken:
                        type: string
                        description: Alias tương thích test.
                      role:
                        type: string
              examples:
                success:
                  summary: Successful response
                  value:
                    code: 1000
                    message: Success
                    data:
                      token: jwt-token-example
                      user:
                        user_id: 1
                        role: admin
                error:
                  summary: Error response
                  value:
                    code: 4000
                    message: Error message
                    data: null
  /api/auth/signup:
    post:
      tags:
      - Auth
      summary: Đăng ký tài khoản
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - phone_number
              - password
              - full_name
              properties:
                phone_number:
                  type: string
                phone:
                  type: string
                  description: Alias tương thích test; ưu tiên dùng phone_number.
                password:
                  type: string
                  minLength: 6
                full_name:
                  type: string
                dob:
                  type: string
                  example: '2000-01-01'
                gender:
                  type: integer
                  enum:
                  - 0
                  - 1
                  - 2
            examples:
              default:
                summary: Request example
                value:
                  phone_number: 0900000001
                  phone: 0900000001
                  password: Password123
                  full_name: Nguyen Van A
                  dob: '2000-01-01'
                  gender: 0
      responses:
        '200':
          description: OK - trả OTP info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success:
                  summary: Successful response
                  value:
                    code: 1000
                    message: Success
                    data:
                      updated: true
                error:
                  summary: Error response
                  value:
                    code: 4000
                    message: Error message
                    data: null
  /api/auth/verify_otp:
    post:
      tags:
      - Auth
      summary: Xác thực OTP
      requestBody:
        required: true
        content:
          application/json:
