                phone_number:
                  type: string
                phone:
                  type: string
                  description: Alias tương thích test; ưu tiên dùng phone_number.
                otp:
                  type: string
                otp_code:
                  type: string
                  description: Alias tương thích test; ưu tiên dùng otp.
                otp_type:
                  type: string
                  enum:
                  - signup
                  - reset_password
                  default: signup
            examples:
              default:
                summary: Request example
                value:
                  phone_number: 0900000001
                  phone: 0900000001
                  otp: '123456'
                  otp_code: string
                  otp_type: signup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success:
                  summary: Successful response
                  value:
                    code: 1000
                    message: Success
                    data:
                      updated: true
                error:
                  summary: Error response
                  value:
                    code: 4000
                    message: Error message
                    data: null
