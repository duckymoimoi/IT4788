# ==============================================================
# HOSPITAL NAVIGATION SYSTEM - Docker Compose (Production CI/CD)
# 3 containers: Go API + PostgreSQL + Admin Panel
# ==============================================================
# Deploy: docker compose -f docker-compose.ci.yml up -d
# Reset DB/data volumes: docker compose -f docker-compose.ci.yml down -v
# ==============================================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:17-alpine
    container_name: hospital-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: admin_hospital
      POSTGRES_PASSWORD: $$2a$$1Q!512355ssgavb@
    # ports:
    #   - "5433:5432"  # REMOVED TO PREVENT BOTNET ATTACKS
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_hospital -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - proxy-net

  # ---- Go API Server ----
  group3-api:
    image: ghcr.io/duckymoimoi/it4788:latest
    container_name: hospital-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_DSN: "host=db user=admin_hospital password=$$2a$$1Q!512355ssgavb@ dbname=hospital port=5432 sslmode=disable"
      JWT_SECRET: "hospital-prod-secret-change-me-2026"
    volumes:
      - uploads:/app/uploads       # Giu file uploads giua cac lan restart
      - audio:/app/audio           # Cache TTS audio files
      - mapdata:/app/data          # Luu tru file map va output.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.group3-api.rule=Host(`group3.it4788.sukkaito.id.vn`)"
      - "traefik.http.routers.group3-api.entrypoints=websecure"
      - "traefik.http.routers.group3-api.tls=true"
      - "traefik.http.routers.group3-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.group3-api.loadbalancer.server.port=8080"
    networks:
      - proxy-net

  # ---- Admin Panel (React + Nginx) ----
  group3-admin:
    image: ghcr.io/duckymoimoi/it4788-admin:latest
    container_name: hospital-admin
    restart: unless-stopped
    depends_on:
      - group3-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.group3-admin.rule=Host(`group3-admin.it4788.sukkaito.id.vn`)"
      - "traefik.http.routers.group3-admin.entrypoints=websecure"
      - "traefik.http.routers.group3-admin.tls=true"
      - "traefik.http.routers.group3-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.group3-admin.loadbalancer.server.port=80"
    networks:
      - proxy-net

volumes:
  pgdata:                          # PostgreSQL data persist
  uploads:                         # User uploaded files
  audio:                           # TTS voice files cache
  mapdata:                         # Map and output files
networks:

  proxy-net:
    external: true
